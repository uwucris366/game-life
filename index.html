<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego 3D Base - Con Cielo y Calle</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #bloqueo {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 999;
            cursor: pointer;
        }
        #instrucciones {
            font-size: 24px;
        }
        #mira {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="bloqueo">
        <div id="instrucciones">
            <h1 style="margin-bottom: 10px;">JUEGO 3D BASE</h1>
            <p><strong>CLIC PARA JUGAR</strong></p>
            <p style="font-size: 16px; color: #ccc;">Moverse: W, A, S, D<br>Mirar: Ratón<br>Salir: ESC</p>
        </div>
    </div>

    <div id="mira"></div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let camera, scene, renderer, controls;
        let moverAdelante = false, moverAtras = false, moverIzquierda = false, moverDerecha = false;
        
        const velocidad = new THREE.Vector3();
        const direccion = new THREE.Vector3();
        let reloj = new THREE.Clock();

        init();
        animate();

        function init() {
            scene = new THREE.Scene();

            // Instancia para cargar texturas
            const cargadorTexturas = new THREE.TextureLoader();

            // 1. CARGAR IMAGEN DE CIELO
            cargadorTexturas.load('cielo.png', function(texturaCielo) {
                texturaCielo.mapping = THREE.EquirectangularReflectionMapping;
                scene.background = texturaCielo;
            });
            
            scene.fog = new THREE.FogExp2(0xffffff, 0.005); 

            // Cámara
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 1.6; 

            // Luces
            const luzAmbiental = new THREE.AmbientLight(0xffffff, 1.2);
            scene.add(luzAmbiental);

            const luzDirecional = new THREE.DirectionalLight(0xffffff, 1.0);
            luzDirecional.position.set(20, 40, 20);
            scene.add(luzDirecional);

            // Controles
            controls = new PointerLockControls(camera, document.body);

            const bloqueo = document.getElementById('bloqueo');
            bloqueo.addEventListener('click', () => { controls.lock(); });
            controls.addEventListener('lock', () => { bloqueo.style.display = 'none'; });
            controls.addEventListener('unlock', () => { bloqueo.style.display = 'flex'; });
            scene.add(controls.getObject());

            // Teclado
            const onKeyDown = (event) => {
                switch (event.code) {
                    case 'KeyW': moverAdelante = true; break;
                    case 'KeyA': moverIzquierda = true; break;
                    case 'KeyS': moverAtras = true; break;
                    case 'KeyD': moverDerecha = true; break;
                }
            };

            const onKeyUp = (event) => {
                switch (event.code) {
                    case 'KeyW': moverAdelante = false; break;
                    case 'KeyA': moverIzquierda = false; break;
                    case 'KeyS': moverAtras = false; break;
                    case 'KeyD': moverDerecha = false; break;
                }
            };

            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            // --- CAMBIO AQUÍ: SUELO CON TEXTURA 'calle.png' ---
            const sueloGeo = new THREE.PlaneGeometry(200, 200);
            
            // Creamos el material básico para el suelo
            const sueloMat = new THREE.MeshStandardMaterial({ roughness: 0.9 });

            // Cargamos la imagen de la calle
            cargadorTexturas.load('calle.png', function(texturaSuelo) {
                // Hacemos que la textura se repita (efecto mosaico)
                texturaSuelo.wrapS = THREE.RepeatWrapping;
                texturaSuelo.wrapT = THREE.RepeatWrapping;
                
                // Cuántas veces se repite la imagen en el plano de 200x200 (ajusta estos números si queda muy grande o pequeña)
                texturaSuelo.repeat.set(20, 20); 
                
                // Asignamos la textura al material
                sueloMat.map = texturaSuelo;
                sueloMat.needsUpdate = true; // Avisamos a Three.js que redibuje el material
            });

            const suelo = new THREE.Mesh(sueloGeo, sueloMat);
            suelo.rotation.x = -Math.PI / 2;
            scene.add(suelo);

            // Obstáculos (Cubos)
            const cuboGeo = new THREE.BoxGeometry(2, 4, 2);
            for (let i = 0; i < 50; i++) {
                const cuboMat = new THREE.MeshStandardMaterial({ 
                    color: Math.random() * 0xffffff,
                    roughness: 0.5 
                });
                const cubo = new THREE.Mesh(cuboGeo, cuboMat);
                cubo.position.x = (Math.random() - 0.5) * 100;
                cubo.position.z = (Math.random() - 0.5) * 100;
                cubo.position.y = 2;
                scene.add(cubo);
            }

            // Renderizador
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Bucle de Animación
        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked === true) {
                const delta = reloj.getDelta();

                velocidad.x -= velocidad.x * 10.0 * delta;
                velocidad.z -= velocidad.z * 10.0 * delta;

                direccion.z = Number(moverAdelante) - Number(moverAtras);
                direccion.x = Number(moverDerecha) - Number(moverIzquierda);
                direccion.normalize();

                if (moverAdelante || moverAtras) velocidad.z -= direccion.z * 400.0 * delta;
                if (moverIzquierda || moverDerecha) velocidad.x -= direccion.x * 400.0 * delta;

                controls.moveRight(-velocidad.x * delta);
                controls.moveForward(-velocidad.z * delta);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
